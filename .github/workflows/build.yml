name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Imposta JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Rendi eseguibile gradlew
        run: chmod +x ./gradlew

      - name: Compila APK di debug
        run: ./gradlew assembleDebug

      - name: Carica APK come risultato scaricabile
        uses: actions/upload-artifact@v4
        with:
          name: KioskBrowser-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
